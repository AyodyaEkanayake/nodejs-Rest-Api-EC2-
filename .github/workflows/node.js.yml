name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - run: npm ci

    - name: Create .env file
      run: |
        echo "MONGO_DB_URL=${{ secrets.MONGO_DB_URL }}" > .env

    - name: Start or Restart Backend
      run: |
        pm2 start server.js --name BackendAPI || pm2 restart BackendAPI
        pm2 save
